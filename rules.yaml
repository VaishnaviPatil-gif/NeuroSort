# SmartWatch — rule configuration
# Rules are evaluated top-to-bottom; first match wins.
# ALL criteria in a rule must match (AND logic).
# Within `contains`, any keyword matches (OR logic).

# ── Ignore patterns ──────────────────────────────────────
ignore:
  - "*.tmp"
  - "*.crdownload"
  - "*.part"
  - ".DS_Store"
  - "desktop.ini"
  - "thumbs.db"
  - "~*"

# ── Pattern rules (checked before extension rules) ───────
rules:

  # Filename-based rules — no extension required
  - folder: Invoices
    contains: ["invoice", "receipt", "billing"]
    description: "Any file mentioning invoice or receipt"

  - folder: Resumes
    contains: ["resume", "cv", "curriculum"]
    description: "Resume / CV documents"

  - folder: Screenshots
    contains: ["screenshot", "screen shot", "screen-shot", "capture"]
    extensions: [png, jpg, jpeg]
    description: "Screenshots (must be an image)"

  # Size-based rules
  - folder: LargeFiles
    size_gt: 100MB
    description: "Any file over 100 MB"

  # ── Extension rules with time-based organisation ──────
  - folder: Documents
    extensions: [pdf, doc, docx, xls, xlsx, ppt, pptx, odt, ods, odp]
    time_based: year_month       # → Documents/2026/May/
    description: "Office documents, sorted by month"

  - folder: Images
    extensions: [jpg, jpeg, png, gif, bmp, webp, ico, tiff, heic]
    time_based: year_month       # → Images/2026/May/
    description: "Photos/images, sorted by month"

  - folder: Screenshots
    extensions: [png]
    time_based: today            # → Screenshots/Today/
    description: "Fallback for PNGs not matched above"

  # ── Other extension rules ─────────────────────────────
  - folder: Videos
    extensions: [mp4, mkv, avi, mov, wmv, flv, webm, m4v, mpeg]

  - folder: Audio
    extensions: [mp3, wav, flac, aac, ogg, m4a, wma, opus]

  - folder: Text
    extensions: [txt, md, rst, csv, json, xml, yaml, yml, toml, ini, log]

  - folder: Archives
    extensions: [zip, tar, gz, bz2, xz, 7z, rar, tgz]

  - folder: Code
    extensions: [py, js, ts, jsx, tsx, html, css, java, cpp, c, h, go, rs, rb, sh, bat, php]

  - folder: Executables
    extensions: [exe, msi, dmg, pkg, deb, rpm, appimage]

  - folder: Fonts
    extensions: [ttf, otf, woff, woff2]

  - folder: Ebooks
    extensions: [epub, mobi, azw, azw3, fb2]

  - folder: SVG
    extensions: [svg]
